<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GanttTracker Pro — APP CAFIVER</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,400&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
:root{
  /* Arctic Theme */
  --c-bg:#F9FAFB;--c-bg2:#FFFFFF;--c-bg3:#F3F4F6;--c-bg4:#E9EBF0;
  --c-border:#E2E6EF;--c-border2:#EEF0F5;
  --c-blue:#1B4FD8;--c-blue2:#1440B8;--c-blue-glow:rgba(27,79,216,.15);
  --c-green:#059669;--c-yellow:#D97706;--c-red:#DC2626;--c-purple:#7C3AED;
  --c-text:#111827;--c-text2:#4B5563;--c-text3:#9CA3AF;
  --c-usr:#1B4FD8;--c-ti:#059669;--c-prov:#D97706;--c-shared:#7C3AED;
  --radius:12px;--radius-sm:8px;--radius-xs:6px;
  --shadow:0 2px 12px rgba(0,0,0,.08);--shadow-lg:0 8px 32px rgba(0,0,0,.12);
  --trans:.18s cubic-bezier(.4,0,.2,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
body{font-family:'Inter',sans-serif;background:var(--c-bg);color:var(--c-text);font-size:13px;min-height:100vh;overflow:hidden;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--c-border);border-radius:2px;}
.hidden{display:none!important;}

/* ── INPUTS & BUTTONS ── */
input,select,textarea{font-family:'Inter',sans-serif;background:#FFFFFF;border:1px solid var(--c-border);color:var(--c-text);border-radius:var(--radius-xs);font-size:12px;outline:none;transition:border-color var(--trans),box-shadow var(--trans);}
input:focus,select:focus,textarea:focus{border-color:var(--c-blue);box-shadow:0 0 0 3px var(--c-blue-glow);}
select option{background:var(--c-bg3);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:7px 14px;border-radius:var(--radius-xs);border:1px solid var(--c-border);background:#FFFFFF;color:var(--c-text);font-size:12px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;transition:all var(--trans);white-space:nowrap;line-height:1;}
.btn:hover{background:var(--c-bg4);border-color:var(--c-border2);}
.btn-primary{background:var(--c-blue);border-color:var(--c-blue);color:#fff;font-weight:600;}
.btn-primary:hover{background:var(--c-blue2);border-color:var(--c-blue2);box-shadow:0 0 20px var(--c-blue-glow);}
.btn-danger{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.3);color:var(--c-red);}
.btn-danger:hover{background:rgba(239,68,68,.2);}
.btn-ghost{background:transparent;border-color:transparent;color:var(--c-text2);}
.btn-ghost:hover{background:var(--c-bg3);color:var(--c-text);}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn-icon{width:30px;height:30px;padding:0;border-radius:var(--radius-xs);}

/* ── LOGIN ── */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:linear-gradient(135deg,#EBF0FD 0%,#F9FAFB 50%,#EDE9FE 100%);}
#login-screen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(27,79,216,.08) 0%,transparent 70%);pointer-events:none;}
.login-glow{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(27,79,216,.05) 0%,transparent 70%);top:-200px;left:50%;transform:translateX(-50%);pointer-events:none;}
.lcard{background:#FFFFFF;border:1px solid var(--c-border);border-radius:20px;padding:2.5rem 2rem;width:400px;max-width:96vw;box-shadow:0 4px 32px rgba(0,0,0,.1);position:relative;z-index:1;}
.lcard-logo{width:64px;height:64px;background:#1B4FD8;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;box-shadow:0 4px 20px rgba(27,79,216,.3);}
.lcard-logo span{font-size:28px;font-weight:800;color:#fff;}
.lcard h1{font-size:22px;font-weight:700;text-align:center;margin-bottom:4px;color:#111827;}
.lcard p{font-size:12px;color:var(--c-text2);text-align:center;margin-bottom:2rem;}
.fi-wrap{margin-bottom:14px;}
.fi-wrap label{display:block;font-size:10px;font-weight:600;color:var(--c-text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.fi-wrap input{width:100%;padding:10px 12px;}
.fi-wrap-pw{position:relative;}
.fi-wrap-pw input{padding-right:40px;}
.pw-tog{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--c-text3);font-size:16px;line-height:1;transition:color var(--trans);}
.pw-tog:hover{color:var(--c-text2);}
.login-err{background:#FEE2E2;border:1px solid #FCA5A5;color:#DC2626;border-radius:var(--radius-xs);padding:9px 12px;font-size:12px;margin-bottom:14px;display:none;line-height:1.5;}
.login-submit{width:100%;padding:11px;font-size:14px;font-weight:600;border-radius:var(--radius-sm);margin-top:4px;background:#1B4FD8;color:#fff;border-color:#1B4FD8;}

/* ── TOPBAR ── */
#topbar{height:54px;background:#FFFFFF;border-bottom:1.5px solid #D1D5DB;display:flex;align-items:center;padding:0 16px;gap:8px;flex-shrink:0;z-index:100;position:relative;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.tb-logo{width:32px;height:32px;background:#1B4FD8;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;flex-shrink:0;}
.tb-title{font-size:14px;font-weight:700;margin-right:4px;color:#111827;}
.tb-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:#EBF0FD;color:#1B4FD8;border:1px solid #C3D1F9;}
.tb-nav{display:flex;gap:2px;margin-left:8px;}
.tb-nav-btn{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500;color:#6B7280;cursor:pointer;border:none;background:none;font-family:'Inter',sans-serif;transition:all var(--trans);}
.tb-nav-btn:hover{background:#F3F4F6;color:#111827;}
.tb-nav-btn.on{background:#EBF0FD;color:#1B4FD8;font-weight:600;}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sync-ok{background:#059669;}
.sync-saving{background:#1B4FD8;animation:pulse 1s infinite;}
.sync-err{background:#DC2626;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.sync-lbl{font-size:11px;font-weight:500;}
.user-chip{display:flex;align-items:center;gap:7px;padding:4px 10px;border-radius:20px;background:#F3F4F6;border:1px solid var(--c-border);cursor:pointer;transition:all var(--trans);}
.user-chip:hover{border-color:var(--c-blue);}
.uav{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;}
.user-chip-name{font-size:12px;font-weight:500;color:#374151;}

/* ── APP SHELL ── */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
#app-body{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.view-wrap{flex:1;overflow:auto;padding:1.5rem;}

/* ── SECBAR ── */
#secbar{height:42px;background:#F9FAFB;border-bottom:1.5px solid #D1D5DB;display:flex;align-items:center;padding:0 16px;gap:8px;flex-shrink:0;}
.secbar-sep{width:1px;height:20px;background:var(--c-border);}
.secbar-lbl{font-size:11px;color:var(--c-text2);}
#date-range-lbl{font-size:11px;font-weight:500;color:var(--c-text2);min-width:200px;text-align:center;}
.resp-filter-wrap{margin-left:auto;display:flex;align-items:center;gap:6px;}
.resp-filter-wrap select{padding:3px 8px;font-size:11px;}

/* ── GANTT ── */
#view-gantt{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.gantt-headers{display:flex;flex-shrink:0;border-bottom:1px solid var(--c-border);}
.gh-left{width:400px;min-width:400px;flex-shrink:0;border-right:1.5px solid #D1D5DB;background:#FFFFFF;}
.gh-left-inner{height:54px;min-height:54px;max-height:54px;box-sizing:border-box;display:grid;grid-template-columns:1fr 70px;align-items:center;padding:0 10px;}
.gh-left-inner span{font-size:10px;font-weight:600;color:#9CA3AF;text-transform:uppercase;letter-spacing:.06em;}
.gh-right{flex:1;overflow:hidden;}
.month-hd{height:20px;min-height:20px;max-height:20px;display:flex;background:#F3F4F6;border-bottom:1px solid #D1D5DB;}
.month-seg{display:flex;align-items:center;font-size:10px;font-weight:600;color:#9CA3AF;border-right:1px solid var(--c-border);padding:0 8px;white-space:nowrap;overflow:hidden;text-transform:uppercase;letter-spacing:.04em;}
.day-hd{display:flex;height:34px;min-height:34px;max-height:34px;background:#F9FAFB;border-bottom:1.5px solid #D1D5DB;}
.day-col{width:28px;min-width:28px;border-right:1px solid #D1D5DB;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;}
.day-col .dow{font-size:8px;color:var(--c-text3);font-weight:500;line-height:1;}
.day-col .dom{font-size:10px;font-weight:600;color:var(--c-text2);line-height:1.6;}
.day-col.tod .dom{background:#1B4FD8;color:#fff;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:9px;}
.day-col.tod .dow{color:#1B4FD8;}
.day-col.we{background:#F5F5F5;}
.gantt-body-wrap{flex:1;display:flex;overflow:hidden;}
.gl-body{width:400px;min-width:400px;flex-shrink:0;border-right:1px solid var(--c-border);overflow-y:scroll;overflow-x:hidden;scrollbar-width:none;}
.gl-body::-webkit-scrollbar{display:none;}
.grow{height:36px;min-height:36px;max-height:36px;box-sizing:border-box;display:grid;grid-template-columns:1fr 70px;align-items:center;border-bottom:1px solid #E5E7EB;cursor:pointer;transition:background var(--trans);user-select:none;overflow:hidden;}
.grow:hover:not(.grow-grp){background:#EBF0FD;}
.grow-grp{background:#F9FAFB;cursor:default;border-bottom:1px solid #E5E7EB;height:36px;min-height:36px;max-height:36px;box-sizing:border-box;}
.grow-overall{background:#F0F4FF;height:36px;min-height:36px;max-height:36px;box-sizing:border-box;border-bottom:1px solid #E5E7EB;}
.grow.sel{background:#DBEAFE!important;}
.gcell-n{display:flex;align-items:center;gap:6px;padding:0 10px;overflow:hidden;}
.gcell-pct{text-align:center;font-size:11px;font-weight:700;padding-right:10px;color:var(--c-text2);}
.gtog{background:none;border:none;cursor:pointer;color:var(--c-text3);font-size:9px;padding:2px;flex-shrink:0;transition:transform .2s;line-height:1;}
.gtog.open{transform:rotate(90deg);}
.g-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.task-lbl{font-size:12px;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.task-lbl.grp-lbl{font-weight:600;font-size:12px;color:#111827;}
.cal-bw{flex:1;overflow:auto;position:relative;}
.cal-b{position:relative;}
.cal-row{height:36px;min-height:36px;max-height:36px;box-sizing:border-box;display:flex;position:relative;border-bottom:1px solid #E5E7EB;overflow:hidden;}
.cal-row.grp-r{background:#F9FAFB;}
.cal-row.overall-r{background:#F0F4FF;}
.dcell{width:28px;min-width:28px;border-right:1px solid #D1D5DB;height:100%;flex-shrink:0;}
.dcell.we{background:#F5F5F5;}
.dcell.tod{background:#DBEAFE;}
.gbar{position:absolute;top:50%;transform:translateY(-50%);height:20px;border-radius:4px;cursor:pointer;overflow:hidden;display:flex;align-items:center;transition:filter var(--trans);}
.gbar:hover{filter:brightness(1.15);}
.gbar-bg{position:absolute;inset:0;border-radius:4px;}
.gbar-fill{position:absolute;top:0;left:0;height:100%;border-radius:4px;opacity:.9;}
.gbar-txt{position:relative;z-index:1;font-size:10px;font-weight:600;color:#fff;padding:0 7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;text-shadow:0 1px 2px rgba(0,0,0,.4);}
.tline{position:absolute;top:0;bottom:0;width:2px;background:#1B4FD8;opacity:.5;z-index:10;pointer-events:none;}
.gbar.dragging{opacity:.5;cursor:grabbing!important;z-index:50;box-shadow:0 4px 12px rgba(27,79,216,.2);}
.gbar{cursor:grab;}
.grow.drag-over{background:#DBEAFE!important;outline:2px dashed #1B4FD8;}
.drag-ghost{position:fixed;pointer-events:none;z-index:9999;background:#FFFFFF;border:1px solid #1B4FD8;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600;color:#111827;box-shadow:0 4px 16px rgba(27,79,216,.15);white-space:nowrap;max-width:260px;overflow:hidden;text-overflow:ellipsis;}
.grow.can-drop{background:rgba(16,185,129,.08)!important;}
.tline::before{content:'';position:absolute;top:-4px;left:50%;transform:translateX(-50%);width:8px;height:8px;border-radius:50%;background:#1B4FD8;}

/* ── DETAIL PANEL ── */
#dp{position:fixed;top:0;right:0;width:520px;height:100vh;background:#FFFFFF;border-left:1px solid var(--c-border);z-index:300;display:flex;flex-direction:column;box-shadow:-4px 0 24px rgba(0,0,0,.08);transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);}
#dp.open{transform:translateX(0);}
.dp-prog-bar{height:3px;background:#1B4FD8;transition:width .3s;flex-shrink:0;}
.dp-hd{padding:16px 20px 12px;border-bottom:1px solid var(--c-border);flex-shrink:0;}
.dp-title-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:12px;}
.dp-title{flex:1;font-size:16px;font-weight:700;border:none;outline:none;background:transparent;resize:none;line-height:1.4;color:#111827;}
.dp-acts{display:flex;gap:4px;flex-shrink:0;}
.dp-meta{display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap;}
.dp-mf label{display:block;font-size:9px;font-weight:600;color:var(--c-text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.pct-blk{display:flex;align-items:center;gap:8px;background:#EBF0FD;border:1px solid #C3D1F9;border-radius:var(--radius-xs);padding:6px 10px;}
.pct-num{font-size:18px;font-weight:800;color:#1B4FD8;width:44px;border:none;background:transparent;outline:none;font-family:'Inter',sans-serif;}
.pct-range{flex:1;min-width:80px;accent-color:#1B4FD8;}
.dp-date{padding:6px 8px;}
.dp-tabs{display:flex;border-bottom:1px solid var(--c-border);padding:0 20px;flex-shrink:0;}
.dp-tab{padding:10px 14px;font-size:12px;font-weight:600;color:var(--c-text3);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all var(--trans);font-family:'Inter',sans-serif;}
.dp-tab:hover{color:var(--c-text);}
.dp-tab.on{color:#1B4FD8;border-bottom-color:#1B4FD8;}
.dp-body{flex:1;overflow-y:auto;padding:16px 20px;}
.dp-sec{margin-bottom:16px;}
.dp-sec-t{font-size:10px;font-weight:600;color:#9CA3AF;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
.dp-fr{display:grid;grid-template-columns:120px 1fr;align-items:center;padding:8px 0;border-bottom:1px solid var(--c-border2);}
.dp-fr:last-child{border-bottom:none;}
.dp-fk{font-size:12px;color:var(--c-text2);font-weight:500;}
.dp-fv input,.dp-fv select,.dp-fv textarea{width:100%;padding:5px 8px;}
.dp-fv textarea{resize:vertical;min-height:80px;line-height:1.5;}
.sem-row{display:flex;gap:8px;flex-wrap:wrap;}
.sem-opt{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;cursor:pointer;border:1px solid var(--c-border);font-size:11px;font-weight:600;transition:all var(--trans);}
.s-g{color:#059669;}.s-g.on{background:#D1FAE5;border-color:#059669;}
.s-y{color:#D97706;}.s-y.on{background:#FEF3C7;border-color:#D97706;}
.s-r{color:#DC2626;}.s-r.on{background:#FEE2E2;border-color:#DC2626;}
.semdot{width:8px;height:8px;border-radius:50%;}
.notes-area{width:100%;min-height:130px;font-size:13px;padding:10px;border-radius:var(--radius-xs);outline:none;line-height:1.6;resize:vertical;}
.c-box{display:flex;gap:8px;margin-bottom:14px;}
.c-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;margin-top:2px;}
.c-inp{flex:1;padding:8px 10px;border-radius:var(--radius-xs);}
.c-item{display:flex;gap:8px;margin-bottom:10px;}
.c-txt{flex:1;background:#F3F4F6;border-radius:var(--radius-xs);padding:8px 10px;border:1px solid var(--c-border);}
.c-author{font-size:11px;font-weight:600;margin-bottom:3px;color:#111827;}
.c-body{font-size:12px;color:var(--c-text2);line-height:1.5;}
.c-time{font-size:10px;color:var(--c-text3);margin-top:4px;}
.ev-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-xs);background:#F9FAFB;border:1px solid var(--c-border);margin-bottom:8px;}
.ev-icon{font-size:20px;flex-shrink:0;}
.ev-info{flex:1;min-width:0;}
.ev-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ev-meta{font-size:10px;color:var(--c-text3);margin-top:2px;}
.ev-link{font-size:11px;color:#1B4FD8;text-decoration:none;}
.ev-link:hover{text-decoration:underline;}
#dp-overlay{position:fixed;inset:0;z-index:299;background:rgba(0,0,0,.3);backdrop-filter:blur(2px);display:none;}
#dp-overlay.on{display:block;}

/* ── MODALS ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:500;}
.modal{background:#FFFFFF;border:1px solid var(--c-border);border-radius:var(--radius);padding:1.75rem;width:520px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.12);}
.modal-sm{width:380px;}
.modal h2{font-size:16px;font-weight:700;margin-bottom:1.25rem;display:flex;align-items:center;gap:8px;}
.modal h2 .micon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.mf{margin-bottom:12px;}
.mf label{display:block;font-size:10px;font-weight:600;color:var(--c-text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.mf input,.mf select,.mf textarea{width:100%;padding:8px 10px;}
.mf textarea{resize:vertical;min-height:70px;line-height:1.5;}
.mf-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--c-border);}
.color-grid{display:flex;gap:8px;flex-wrap:wrap;}
.color-swatch{width:28px;height:28px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:all var(--trans);}
.color-swatch.sel{border-color:#fff;transform:scale(1.15);}

/* ── VIEWS ── */
.page-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
.page-hd h2{font-size:18px;font-weight:700;color:#111827;}
.page-hd p{font-size:12px;color:var(--c-text2);margin-top:2px;}

/* projects grid */
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.proj-card{background:#FFFFFF;border:1px solid var(--c-border);border-radius:var(--radius);overflow:hidden;transition:all var(--trans);cursor:pointer;}
.proj-card:hover{border-color:#1B4FD8;box-shadow:0 4px 20px rgba(27,79,216,.1);transform:translateY(-2px);}
.proj-card-top{height:6px;}
.proj-card-body{padding:16px;}
.proj-card-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.proj-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.proj-card-title{font-size:14px;font-weight:700;margin-bottom:2px;color:#111827;}
.proj-card-owner{font-size:11px;color:var(--c-text2);}

tbody td{padding:8px 10px;border-bottom:1px solid #EEF0F5;font-size:12px;vertical-align:middle;color:#374151;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover{background:#F9FAFB;}
.empty-msg{padding:2.5rem;text-align:center;color:var(--c-text3);font-size:13px;}

/* hist */
.hist-wrap{background:#FFFFFF;border:1px solid var(--c-border);border-radius:var(--radius);overflow:hidden;}

/* ── RESP BADGES ── */
.rbadge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;}

.rb-T{background:#D1FAE5;color:#059669;border:1px solid #6EE7B7;}

.rb-S{background:#EDE9FE;color:#7C3AED;border:1px solid #C4B5FD;}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:#1E293B;border:none;color:#F8FAFC;padding:9px 20px;border-radius:20px;font-size:12px;font-weight:500;opacity:0;transition:all .25s;pointer-events:none;z-index:9999;max-width:90vw;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.2);}

#chpass-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:600;}

function loadData(){
  setSyncUI('saving','Cargando...');
  // Projects real-time
  db.collection('projects').onSnapshot(function(s){
    projects=s.docs.map(function(d){return d.data();});
    if(curView==='projects')renderProjects();
    if(curView==='gantt')renderGantt();
  });
  // Tasks real-time
  db.collection('tasks').onSnapshot(function(s){
    tasks=s.docs.map(function(d){return d.data();});
    if(curView==='gantt')renderGantt();
    setSyncUI('ok','En línea ✓');
  });
  // Comments
  db.collection('comments').onSnapshot(function(s){comments=s.docs.map(function(d){return d.data();});});
  // Evidencias
  db.collection('evidencias').onSnapshot(function(s){evidencias=s.docs.map(function(d){return d.data();});});
  // Fases
  db.collection('fases').onSnapshot(function(s){fases=s.docs.map(function(d){return d.data();});if(curView==='gantt')renderGantt();});
  // Fases
  db.collection('fases').onSnapshot(function(s){fases=s.docs.map(function(d){return d.data();});if(curView==='gantt')renderGantt();});
  // Daily logs
  db.collection('dailylogs').get().then(function(s){dailyLogs=s.docs.map(function(d){return d.data();});});

function addProjRows(rows,projs,filtTasks,baseIndent){
  projs.forEach(function(proj){
    var projName=proj.name;
    var projTasks=tasks.filter(function(t){return(t.proyecto||t.proj)===projName;});
    if(!projTasks.length)return;
    var projFiltTasks=filtTasks.filter(function(t){return(t.proyecto||t.proj)===projName;});
    var projPct=Math.round(projTasks.reduce(function(a,t){return a+(t.status==='completado'?100:(t.pct||0));},0)/projTasks.length);
    var pc=proj.color||projColor(projName);
    var isCP=collapsed.has('PROJ:'+projName);
    rows.push({type:'proj',name:projName,color:pc,pct:projPct,collapsed:isCP,indent:baseIndent});
    if(isCP)return;

    var faseNames=[];
    fases.filter(function(f){return f.proyecto===projName;}).forEach(function(f){if(faseNames.indexOf(f.nombre)<0)faseNames.push(f.nombre);});
    projTasks.forEach(function(t){if(t.fase&&faseNames.indexOf(t.fase)<0)faseNames.push(t.fase);});

    if(faseNames.length>0){
      faseNames.forEach(function(faseName){
        var faseTasks=projTasks.filter(function(t){return t.fase===faseName;});
        var faseFilt=projFiltTasks.filter(function(t){return t.fase===faseName;});
        if(!faseTasks.length)return;
        var fasePct=Math.round(faseTasks.reduce(function(a,t){return a+(t.status==='completado'?100:(t.pct||0));},0)/faseTasks.length);
        var isCF=collapsed.has('FASE:'+projName+'|'+faseName);
        rows.push({type:'fase',name:faseName,proj:projName,color:pc,pct:fasePct,collapsed:isCF,indent:baseIndent+18});
        if(isCF)return;
        faseFilt.forEach(function(t){rows.push({type:'task',t:t,indent:baseIndent+36});});
      });
      // Tasks without fase
      projFiltTasks.filter(function(t){return !t.fase;}).forEach(function(t){rows.push({type:'task',t:t,indent:baseIndent+22});});
    } else {
      projFiltTasks.forEach(function(t){rows.push({type:'task',t:t,indent:baseIndent+22});});
    }
  });
}

var _dragTaskId=null, _dragGhost=null;

function initRowDrag(){
  // Make task rows in left panel draggable
  document.querySelectorAll('#gl-body .grow:not(.grow-grp):not(.grow-overall)').forEach(function(row){
    var tid=row.id.replace('lr_','');
    if(!tid)return;
    row.draggable=true;
    row.addEventListener('dragstart',function(e){
      _dragTaskId=tid;
      var t=tasks.find(function(x){return x.id===tid;});
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain',tid);
      // Create ghost
      _dragGhost=document.createElement('div');
      _dragGhost.className='drag-ghost';
      _dragGhost.textContent='📋 '+(t?t.name:'Tarea').slice(0,40);
      document.body.appendChild(_dragGhost);
      e.dataTransfer.setDragImage(document.createElement('div'),0,0);
      setTimeout(function(){row.classList.add('dragging');},0);
    });
    row.addEventListener('dragend',function(){
      row.classList.remove('dragging');
      if(_dragGhost){_dragGhost.remove();_dragGhost=null;}
      document.querySelectorAll('.grow.drag-over').forEach(function(el){el.classList.remove('drag-over');});
      _dragTaskId=null;
    });
  });

  // Make group/fase rows drop targets
  document.querySelectorAll('#gl-body .grow-grp').forEach(function(row){
    row.addEventListener('dragover',function(e){
      if(!_dragTaskId)return;
      e.preventDefault();
      e.dataTransfer.dropEffect='move';
      document.querySelectorAll('.grow.drag-over').forEach(function(el){el.classList.remove('drag-over');});
      row.classList.add('drag-over');
    });
    row.addEventListener('dragleave',function(){row.classList.remove('drag-over');});
    row.addEventListener('drop',function(e){
      e.preventDefault();
      row.classList.remove('drag-over');
      if(!_dragTaskId)return;
      var t=tasks.find(function(x){return x.id===_dragTaskId;});
      if(!t)return;
      // Determine target: is it a PROJ or FASE row?
      var rowText=row.querySelector('.task-lbl')?row.querySelector('.task-lbl').textContent.trim():'';
      // Check if it's a project (has g-dot with box-shadow containing 44)
      var isProjRow=row.style.background&&row.style.background.indexOf('0.08')!==-1;
      if(isProjRow){
        // Drop on project — change proyecto, clear fase
        confirmAction('¿Mover tarea?','"'+t.name.slice(0,50)+'" → Proyecto: '+rowText,function(){
          t.proyecto=rowText;t.proj=rowText;t.fase='';t.updBy=curUser.name;t.updTs=nowStr();
          fbSaveTask(t);toast('✅ Tarea movida a: '+rowText);
        });
      } else {
        // Drop on fase row — keep project, change fase
        var faseName=rowText;
        // Find what project this fase belongs to
        var faseObj=fases.find(function(f){return f.nombre===faseName;});
        var projName=faseObj?faseObj.proyecto:(t.proyecto||t.proj);
        confirmAction('¿Mover tarea?','"'+t.name.slice(0,50)+'" → Fase: '+faseName,function(){
          t.proyecto=projName;t.proj=projName;t.fase=faseName;t.updBy=curUser.name;t.updTs=nowStr();
          fbSaveTask(t);toast('✅ Tarea movida a fase: '+faseName);
        });
      }
    });
  });
}

// ════════════════════════════════════════
var _barDrag={active:false,taskId:null,type:null,startX:0,origStart:null,origEnd:null,dayW:28};

function initBarDrag(){
  document.querySelectorAll('#cal-b .gbar').forEach(function(bar){
    var tid=null;
    // Get task id from bar's onclick
    bar.addEventListener('mousedown',function(e){
      // Find task by matching bar position
      var leftPx=parseInt(bar.style.left)||0;
      var widPx=parseInt(bar.style.width)||0;
      // Determine if clicking left edge (resize start), right edge (resize end), or middle (move)
      var rect=bar.getBoundingClientRect();
      var relX=e.clientX-rect.left;
      var isLeftEdge=relX<10;
      var isRightEdge=relX>rect.width-10;
      // Find which task this bar belongs to
      var dayOffset=Math.round(leftPx/28);
      var barDate=addD(ganttStart,dayOffset);
      var barYmd=ymd(barDate);
      var matchTask=tasks.find(function(t){return t.start===barYmd;});
      if(!matchTask){
        // Try by width
        var endOffset=Math.round((leftPx+widPx)/28)-1;
        var endDate=addD(ganttStart,endOffset);
        matchTask=tasks.find(function(t){return t.start===barYmd||t.end===ymd(endDate);});
      }
      if(!matchTask)return;
      e.preventDefault();
      _barDrag.active=true;
      _barDrag.taskId=matchTask.id;
      _barDrag.type=isLeftEdge?'resize-start':isRightEdge?'resize-end':'move';
      _barDrag.startX=e.clientX;
      _barDrag.origStart=matchTask.start;
      _barDrag.origEnd=matchTask.end;
      _barDrag.bar=bar;
      bar.classList.add('dragging');
      document.body.style.userSelect='none';
      document.body.style.cursor=isLeftEdge||isRightEdge?'ew-resize':'grabbing';
    });
  });

  document.addEventListener('mousemove',barDragMove);
  document.addEventListener('mouseup',barDragEnd);
}

function barDragMove(e){
  if(!_barDrag.active)return;
  var dx=e.clientX-_barDrag.startX;
  var daysDelta=Math.round(dx/28);
  if(daysDelta===0)return;
  var t=tasks.find(function(x){return x.id===_barDrag.taskId;});
  if(!t)return;

  var origS=new Date(_barDrag.origStart+'T12:00:00');
  var origE=new Date(_barDrag.origEnd+'T12:00:00');

  if(_barDrag.type==='move'){
    var newS=addD(origS,daysDelta);
    var newE=addD(origE,daysDelta);
    _barDrag.bar.style.left=(parseInt(_barDrag.bar.style.left)+dx-(_barDrag._lastDx||0))+'px';
    _barDrag._preview={start:ymd(newS),end:ymd(newE)};
  } else if(_barDrag.type==='resize-start'){
    var newS2=addD(origS,daysDelta);
    if(newS2<origE){
      _barDrag._preview={start:ymd(newS2),end:_barDrag.origEnd};
    }
  } else if(_barDrag.type==='resize-end'){
    var newE2=addD(origE,daysDelta);
    if(newE2>origS){
      _barDrag._preview={start:_barDrag.origStart,end:ymd(newE2)};
    }
  }
  _barDrag._lastDx=dx;
}

function barDragEnd(e){
  if(!_barDrag.active)return;
  _barDrag.active=false;
  document.body.style.userSelect='';
  document.body.style.cursor='';
  if(_barDrag.bar)_barDrag.bar.classList.remove('dragging');

  var t=tasks.find(function(x){return x.id===_barDrag.taskId;});
  if(t&&_barDrag._preview){
    var prev=_barDrag._preview;
    if(prev.start!==t.start||prev.end!==t.end){
      t.start=prev.start;
      t.end=prev.end;
      t.updBy=curUser.name;t.updTs=nowStr();
      addH(t,'fechas',prev.start+' → '+prev.end);
      fbSaveTask(t);
      toast('📅 Fechas actualizadas');
      renderGantt();
      setTimeout(initBarDrag,100);
    }
  }
  _barDrag={active:false,taskId:null,type:null,startX:0,origStart:null,origEnd:null,bar:null,_preview:null,_lastDx:0};
}

function saveFaseModal(){
  var nombre=document.getElementById('fm-nombre').value.trim();
  var proj=document.getElementById('fm-proj').value;
  if(!nombre){toast('⚠️ Escribe el nombre de la fase.');return;}
  if(editFaseId){
    var oldFase=fases.find(function(x){return x.id===editFaseId;});
    db.collection('fases').doc(editFaseId).update({nombre:nombre,proyecto:proj,desc:document.getElementById('fm-desc').value.trim(),updTs:nowStr()})
      .then(function(){
        if(oldFase&&oldFase.nombre!==nombre){
          // Rename fase in all tasks
          var affected=tasks.filter(function(t){return t.fase===oldFase.nombre&&(t.proyecto||t.proj)===oldFase.proyecto;});
          if(affected.length>0){
            var batch=db.batch();
            affected.forEach(function(t){batch.update(db.collection('tasks').doc(t.id),{fase:nombre});});
            batch.commit()
              .then(function(){closeFaseModal();toast('✅ Fase renombrada — '+affected.length+' tarea(s) actualizadas');})
              .catch(function(e){closeFaseModal();toast('⚠️ Error: '+e.message);});
          } else {closeFaseModal();toast('✅ Fase actualizada');}
        } else {closeFaseModal();toast('✅ Fase actualizada');}
      }).catch(function(e){toast('❌ '+e.message);});
  } else {
    var f={id:uid(),nombre:nombre,proyecto:proj,desc:document.getElementById('fm-desc').value.trim(),createdBy:curUser.name,updTs:nowStr()};
    db.collection('fases').doc(f.id).set(f).then(function(){closeFaseModal();toast('✅ Fase creada: '+nombre);}).catch(function(e){toast('❌ '+e.message);});
  }
}
function dpFillFases(projName){
  var sel=document.getElementById('dp-fase-sel');if(!sel)return;
  var t=tasks.find(function(x){return x.id===openTaskId;});
  var curFase=t?t.fase:'';
  var fs=[];
  fases.filter(function(f){return f.proyecto===projName;}).forEach(function(f){fs.push(f.nombre);});
  tasks.forEach(function(tk){if((tk.proyecto||tk.proj)===projName&&tk.fase&&fs.indexOf(tk.fase)<0)fs.push(tk.fase);});
  sel.innerHTML='<option value="">— Sin fase —</option>'+fs.map(function(f){return'<option value="'+f+'"'+(f===curFase?' selected':'')+'>'+f+'</option>';}).join('');
}
function dpGuardarDetalles(){
  var titulo=document.getElementById('dp-title');
  if(titulo&&titulo.value.trim()) dpSave('name',titulo.value.trim());
  var assign=document.getElementById('dp-assign');
  if(assign) dpSave('assign',assign.value);
  var dep=document.getElementById('dp-dep');
  if(dep) dpSave('dep',dep.value);
  var proj=document.getElementById('dp-proj');
  if(proj){dpSave('proj',proj.value);dpSave('proyecto',proj.value);}
  var fase=document.getElementById('dp-fase-sel');
  if(fase) dpSave('fase',fase.value);
  toast('✅ Cambios guardados');
}

function buildColorGrid(selected){
  var html='';
  PROJ_COLORS.forEach(function(c){html+='<div class="color-swatch'+(c===selected?' sel':'')+'" style="background:'+c+'" onclick="pickProjColor(\''+c+'\')"></div>';});
  return html;
}
function pickProjColor(c){selProjColor_=c;document.querySelectorAll('.color-swatch').forEach(function(el){el.classList.toggle('sel',el.style.background===c||el.style.backgroundColor===c);});}
var selProjColor_=PROJ_COLORS[0];

function openEditProject(pid){
  var p=projects.find(function(x){return x.id===pid;});if(!p)return;
  editProjId=pid;selProjColor_=p.color||PROJ_COLORS[0];
  document.getElementById('proj-modal-title').textContent='Editar proyecto';
  document.getElementById('pm-name').value=p.name||'';document.getElementById('pm-desc').value=p.desc||'';
  document.getElementById('pm-owner').value=p.owner||'';document.getElementById('pm-status').value=p.status||'activo';

function closeProjModal(){document.getElementById('proj-modal').classList.add('hidden');editProjId=null;}
function saveProjModal(){
  var name=document.getElementById('pm-name').value.trim();if(!name){toast('⚠️ El nombre es obligatorio.');return;}
  // CAPTURE old name BEFORE any Firebase update
  var oldName=null;
  if(editProjId){
    var oldProj=projects.find(function(x){return x.id===editProjId;});
    if(oldProj) oldName=oldProj.name;
  }
  var p={id:editProjId||uid(),name:name,desc:document.getElementById('pm-desc').value.trim(),
    color:selProjColor_,status:document.getElementById('pm-status').value,
    start:document.getElementById('pm-start').value,end:document.getElementById('pm-end').value,
    owner:document.getElementById('pm-owner').value.trim(),
    propietario:document.getElementById('pm-propietario').value,
    createdBy:curUser?curUser.name:'',updTs:nowStr()};
  db.collection('projects').doc(p.id).set(p)
    .then(function(){
      if(editProjId && oldName && oldName !== name){
        // Name changed — use oldName captured BEFORE Firebase updated the local array
        var affected=tasks.filter(function(t){return t.proj===oldName||t.proyecto===oldName;});
        var faseAffected=fases.filter(function(f){return f.proyecto===oldName;});
        if(affected.length>0||faseAffected.length>0){
          var batch=db.batch();
          affected.forEach(function(t){batch.update(db.collection('tasks').doc(t.id),{proj:name,proyecto:name});});
          faseAffected.forEach(function(f){batch.update(db.collection('fases').doc(f.id),{proyecto:name});});
          batch.commit()
            .then(function(){closeProjModal();toast('✅ Renombrado — '+affected.length+' tareas y '+faseAffected.length+' fases actualizadas');})
            .catch(function(e){closeProjModal();toast('⚠️ Error actualizando referencias: '+e.message);});
        } else {
          closeProjModal();toast('✅ Proyecto actualizado');
        }
      } else if(editProjId){
        closeProjModal();toast('✅ Proyecto actualizado');
      } else {
        closeProjModal();toast('✅ Proyecto creado');
      }
    })
    .catch(function(e){toast('⚠️ '+e.message);});
}
function deleteProject(pid){
  var p=projects.find(function(x){return x.id===pid;});if(!p)return;
  var tc=tasks.filter(function(t){return t.proj===p.name;}).length;
  confirmAction('¿Eliminar proyecto?','"'+p.name+'"'+(tc?' — tiene '+tc+' tarea(s). Las tareas NO se eliminarán pero quedarán sin proyecto.':''),function(){
    db.collection('projects').doc(pid).delete().then(function(){
      // Also delete fases of this project
      var projFases=fases.filter(function(f){return f.proyecto===p.name;});
      if(projFases.length>0){
        var batch=db.batch();
        projFases.forEach(function(f){batch.delete(db.collection('fases').doc(f.id));});
        batch.commit();
      }
      toast('Proyecto eliminado');
    });
  });
}

               p.status==='completado'?'background:#DBEAFE;color:#1E40AF;':
               'background:#FEE2E2;color:#991B1B;')+'">'+(sbLbl[p.status]||p.status)+'</span>'+

function openAddTask(){
  fillProjSelect('');
  var td=new Date().toISOString().slice(0,10);
  ['tm-name','tm-assign','tm-dep','tm-note'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('tm-start').value=td;document.getElementById('tm-end').value=td;
  document.getElementById('tm-resp').value='U';document.getElementById('tm-sem').value='g';
  document.getElementById('tm-status').value='pendiente';document.getElementById('tm-pct').value='0';
  document.getElementById('task-modal').classList.remove('hidden');
}
function openAddTaskFor(projName){
  openAddTask();
  var sel=document.getElementById('tm-proj');
  for(var i=0;i<sel.options.length;i++){if(sel.options[i].value===projName){sel.selectedIndex=i;break;}}
}
function fillProjSelect(selected){
  var gs=projects.map(function(p){return p.name;});
  tasks.forEach(function(t){var pn=t.proyecto||t.proj;if(gs.indexOf(pn)<0)gs.push(pn);});
  document.getElementById('tm-proj').innerHTML=gs.map(function(g){return'<option value="'+g+'"'+(g===selected?' selected':'')+'>'+g+'</option>';}).join('');
  fillFaseSelect(selected||gs[0]||'');
}
function fillFaseSelect(projName){
  var sel=document.getElementById('tm-fase');if(!sel)return;
  var fs=[];
  fases.filter(function(f){return f.proyecto===projName;}).forEach(function(f){fs.push(f.nombre);});
  tasks.forEach(function(t){if((t.proyecto||t.proj)===projName&&t.fase&&fs.indexOf(t.fase)<0)fs.push(t.fase);});
  sel.innerHTML='<option value="">— Sin fase —</option>'+fs.map(function(f){return'<option value="'+f+'">'+f+'</option>';}).join('');
}

  }else{html+='<div class="empty-msg">Sin registros para este día.</div>';}
  html+='</div>';

}
function prefillLog(){var tid=(document.getElementById('log-task')||{}).value;var t=tasks.find(function(x){return x.id===tid;});if(t){document.getElementById('log-status').value=t.status;document.getElementById('log-pct').value=t.pct||0;document.getElementById('log-sem').value=t.sem||'g';}}
function addLog(dk){
  var tid=document.getElementById('log-task').value;var t=tasks.find(function(x){return x.id===tid;});if(!t)return;
  var status=document.getElementById('log-status').value;
  var pct=Math.min(100,Math.max(0,parseInt(document.getElementById('log-pct').value)||0));
  var sem=document.getElementById('log-sem').value;
  var comment=document.getElementById('log-comment').value.trim();
  var now=new Date(),time=now.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
  var log={id:uid(),date:dk,time:time,taskId:tid,taskName:t.name,taskProj:t.proj,user:curUser.name,status:status,pct:pct,sem:sem,comment:comment};
  dailyLogs.push(log);
  db.collection('dailylogs').doc(log.id).set(log);
  t.status=status;t.pct=pct;t.sem=sem;if(pct===100)t.status='completado';
  t.updBy=curUser.name;t.updTs=nowStr();
  fbSaveTask(t);renderDailyContent();toast('✅ Registro guardado');
}
function deleteLog(lid){confirmAction('¿Eliminar registro?','',function(){db.collection('dailylogs').doc(lid).delete();dailyLogs=dailyLogs.filter(function(x){return x.id!==lid;});renderDailyContent();toast('Eliminado');});}
function exportDay(dk){
  var logs=dailyLogs.filter(function(l){return l.date===dk;});if(!logs.length){toast('Sin registros');return;}
  var csv='Hora,Usuario,Proyecto,Tarea,Estado,% Avance,Semáforo,Comentario\n';
  logs.forEach(function(l){csv+=l.time+',"'+l.user+'","'+l.taskProj+'","'+l.taskName+'","'+l.status+'",'+l.pct+'%,"'+(l.sem==='g'?'Verde':l.sem==='y'?'Amarillo':'Rojo')+'","'+(l.comment||'')+'"\n';});
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));a.download='reporte_'+dk+'.csv';a.click();toast('CSV exportado');
}

function notifyAssign(task,prevAssign){
  var newA=(task.assign||'').trim();if(!newA||newA===prevAssign)return;
  newA.split(/[\/,&+]/).map(function(s){return s.trim();}).filter(Boolean).forEach(function(name){
    var entry=null;
    Object.keys(USER_DIR).forEach(function(email){if(USER_DIR[email].name.toLowerCase().indexOf(name.toLowerCase())>=0)entry={email:email,name:USER_DIR[email].name};});
    if(entry){try{emailjs.send('service_sxw6hr8','template_ouuy72c',{to_email:entry.email,to_name:entry.name,from_name:'GanttTracker Pro',subject:'Tarea asignada: '+task.name,message:'Hola '+entry.name+',\n\nSe te asignó la tarea:\nProyecto: '+task.proj+'\nTarea: '+task.name+'\nInicio: '+(task.start||'—')+'\nFin: '+(task.end||'—')+'\nAsignado por: '+curUser.name+'\n\nSaludos,\nGanttTracker Pro'}).then(function(){toast('📧 Correo enviado a '+entry.name);});}catch(e){}}
  });
}

// CHANGE PASSWORD
// ════════════════════════════════════════
function openChPass(){document.getElementById('chpass-new').value='';document.getElementById('chpass-confirm').value='';document.getElementById('chpass-err').style.display='none';document.getElementById('chpass-overlay').classList.remove('hidden');}
function closeChPass(){document.getElementById('chpass-overlay').classList.add('hidden');}
function doChPass(){
  var np=document.getElementById('chpass-new').value,cp=document.getElementById('chpass-confirm').value,err=document.getElementById('chpass-err');
  err.style.display='none';
  if(!np){err.textContent='Ingresa la nueva contraseña.';err.style.display='block';return;}
  if(np.length<6){err.textContent='Mínimo 6 caracteres.';err.style.display='block';return;}
  if(np!==cp){err.textContent='Las contraseñas no coinciden.';err.style.display='block';return;}
  auth.currentUser.updatePassword(np)
    .then(function(){closeChPass();toast('✅ Contraseña actualizada');})
    .catch(function(e){var m='Error al cambiar contraseña.';if(e.code==='auth/requires-recent-login')m='Por seguridad, cierra sesión, vuelve a entrar y luego cambia.';err.textContent=m;err.style.display='block';});
}

// CONFIRM
// ════════════════════════════════════════
function confirmAction(title,msg,cb){_cb=cb;document.getElementById('confirm-title').textContent=title;document.getElementById('confirm-msg').textContent=msg;document.getElementById('confirm-modal').classList.remove('hidden');}
function closeConfirm(){document.getElementById('confirm-modal').classList.add('hidden');_cb=null;}
document.getElementById('confirm-ok').addEventListener('click',function(){if(_cb)_cb();closeConfirm();});
</script>
