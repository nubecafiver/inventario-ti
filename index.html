<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAFIVER · Etiquetas QR</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap');
:root{
  --bg:#0f0f0f;--sf:#1a1a1a;--bd:#2e2e2e;
  --ac:#c8a84b;--red:#8b1a1a;
  --tx:#e8e3d9;--mt:#666;
  --mono:"IBM Plex Mono",monospace;
  --sans:"IBM Plex Sans",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);min-height:100vh}
header{background:var(--sf);border-bottom:2px solid var(--ac);padding:11px 24px;display:flex;align-items:center;gap:14px}
.hlogo{width:40px;height:40px;border-radius:50%;overflow:hidden;border:2px solid var(--ac);flex-shrink:0}
.hlogo img{width:100%;height:100%;object-fit:cover}
.htitle{font-family:var(--mono);font-size:13px;letter-spacing:3px;color:var(--ac)}
.hsub{font-size:11px;color:var(--mt);letter-spacing:1px;margin-top:1px}
.hbadge{margin-left:auto;background:var(--red);color:#ffcdd2;font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:3px;letter-spacing:1px}
.layout{display:grid;grid-template-columns:310px 1fr;min-height:calc(100vh - 66px)}
.sb{background:var(--sf);border-right:1px solid var(--bd);padding:18px 15px;display:flex;flex-direction:column;gap:11px;overflow-y:auto}
.sl{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--ac);text-transform:uppercase;margin-bottom:5px;padding-bottom:4px;border-bottom:1px solid var(--bd)}
.cg{display:flex;flex-direction:column;gap:4px}
.cg label{font-size:10px;color:var(--mt);font-family:var(--mono);letter-spacing:.5px}
input,select{background:var(--bg);border:1px solid var(--bd);border-radius:4px;color:var(--tx);font-family:var(--mono);font-size:12px;padding:7px 9px;width:100%;outline:none;transition:border-color .2s}
input:focus{border-color:var(--ac)}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.tab{background:var(--bg);border:1px solid var(--bd);color:var(--mt);font-family:var(--mono);font-size:11px;padding:7px;border-radius:4px;cursor:pointer;letter-spacing:1px;transition:all .2s;text-align:center}
.tab.on{background:var(--ac);color:var(--bg);border-color:var(--ac);font-weight:700}
.panel{display:none;flex-direction:column;gap:9px}
.panel.on{display:flex}
.infobox{background:#1a160a;border:1px solid #3a2e0a;border-radius:4px;padding:9px 11px;font-size:11px;color:#c8a84b99;line-height:1.6}
.drop{border:2px dashed var(--bd);border-radius:5px;padding:14px;text-align:center;cursor:pointer;transition:border-color .2s}
.drop:hover{border-color:var(--ac)}
.drop input{display:none}
.drop .dt{font-family:var(--mono);font-size:11px;color:var(--mt)}
.drop .df{color:var(--ac);font-size:11px;margin-top:4px;font-family:var(--mono)}
.frow{display:flex;gap:5px}
.frow input{flex:1}
.frow button{background:var(--bd);border:none;color:var(--tx);border-radius:4px;padding:0 9px;cursor:pointer;font-size:12px}
.frow button:hover{background:var(--ac);color:var(--bg)}
.cbadge{background:var(--ac);color:var(--bg);font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700}
.rlist{max-height:180px;overflow-y:auto;border:1px solid var(--bd);border-radius:4px}
.ri{padding:7px 9px;border-bottom:1px solid var(--bd);cursor:pointer;display:flex;align-items:center;gap:7px;transition:background .1s}
.ri:last-child{border-bottom:none}
.ri:hover{background:#222}
.ri.sel{background:#1a150a;border-left:3px solid var(--ac)}
.ri input[type=checkbox]{accent-color:var(--ac);flex-shrink:0}
.rm{flex:1;min-width:0}
.ri-id{font-family:var(--mono);font-size:10px;color:var(--ac)}
.ri-nm{font-size:11px;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ri-rt{font-size:10px;color:var(--mt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bp{background:var(--ac);color:var(--bg);border:none;border-radius:4px;padding:9px;font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;width:100%;transition:filter .2s}
.bp:hover{filter:brightness(1.15)}
.bp:disabled{filter:brightness(.45);cursor:not-allowed}
.bs{background:transparent;border:1px solid var(--bd);color:var(--mt);border-radius:4px;padding:7px;font-family:var(--mono);font-size:11px;cursor:pointer;width:100%;transition:all .2s}
.bs:hover{border-color:var(--ac);color:var(--ac)}
.srow{display:flex;gap:5px}
.ok{font-family:var(--mono);font-size:10px;color:#4caf50;min-height:14px}
.warn{font-family:var(--mono);font-size:10px;color:#ff5252;min-height:14px}

/* PREVIEW */
.pv{padding:22px;overflow-y:auto;background:#141414}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.ph h2{font-family:var(--mono);font-size:11px;letter-spacing:2px;color:var(--ac)}
.pc{display:flex;gap:6px}
.pc button{background:var(--sf);border:1px solid var(--bd);color:var(--tx);font-family:var(--mono);font-size:11px;padding:6px 11px;border-radius:4px;cursor:pointer;transition:all .2s}
.pc button:hover{border-color:var(--ac);color:var(--ac)}
.bpr{background:var(--red)!important;border-color:var(--red)!important;color:#fff!important;font-weight:700}
.bpr:hover{filter:brightness(1.2)!important}
#grid{display:flex;flex-wrap:wrap;gap:14px}
.es{text-align:center;padding:60px 20px;color:var(--mt);font-family:var(--mono);font-size:12px;width:100%}
.es .ei{font-size:40px;margin-bottom:12px;opacity:.25}

/* ═══ ETIQUETA: 2.5cm × 5cm  →  preview a 2×: 95 × 190 px ═══
   Layout vertical: logo | qr | número | ruta
   SIN franja lateral                                          */
.lw{position:relative;cursor:default}
.lw:hover .la{display:flex}
.la{position:absolute;top:-7px;right:-7px;display:none;gap:3px;z-index:10}
.la button{background:var(--red);border:none;color:#fff;font-size:9px;padding:3px 6px;border-radius:3px;cursor:pointer;font-family:var(--mono)}

.qlabel{
  /* Physical: 2.5cm × 5cm — Preview 2×: 189px × 378px */
  width:189px;
  height:378px;
  background:#fff;
  border-radius:3px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  overflow:hidden;
  box-shadow:0 3px 12px rgba(0,0,0,.6);
  padding:8px 6px 6px 6px;
}
.ql-logo{
  width:120px;height:120px;
  border-radius:50%;
  overflow:hidden;
  flex-shrink:0;
}
.ql-logo img{width:100%;height:100%;object-fit:cover;display:block}
.ql-qr{
  margin-top:6px;
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.ql-qr canvas,.ql-qr img{display:block}
.ql-num{
  font-size:14px;
  font-family:monospace;
  color:#111;
  letter-spacing:.5px;
  margin-top:5px;
  text-align:center;
}
.ql-ruta{
  font-size:10px;
  font-weight:700;
  color:#8b1a1a;
  text-align:center;
  text-transform:uppercase;
  letter-spacing:.5px;
  margin-top:4px;
  line-height:1.3;
  padding:0 6px;
  word-break:break-word;
}

/* ═══ PRINT ═══ */
@media print{
  @page{margin:2mm;size:auto}
  body *{visibility:hidden}
  #parea,#parea *{visibility:visible}
  #parea{position:absolute;top:0;left:0;display:flex;flex-wrap:wrap;gap:1.5mm}
  .qlabel{
    width:25mm!important;
    height:50mm!important;
    box-shadow:none!important;
    border-radius:.5mm!important;
    page-break-inside:avoid;
    padding:1.5mm 1mm 1mm 1mm!important;
  }
  .ql-logo{width:16mm!important;height:16mm!important}
  .ql-qr{margin-top:1mm!important}
  .ql-qr canvas,.ql-qr img{width:21mm!important;height:21mm!important}
  .ql-num{font-size:6pt!important;margin-top:1mm!important;letter-spacing:.3pt!important}
  .ql-ruta{font-size:5pt!important;margin-top:.8mm!important;letter-spacing:.3pt!important}
}
</style>
</head>
<body>
<header>
  <div class="hlogo"><img id="himg" src="" alt="CF"></div>
  <div>
    <div class="htitle">CAFIVER · QR Labels</div>
    <div class="hsub">Sistema de etiquetas destinatario</div>
  </div>
  <span class="hbadge">EST. 1985</span>
</header>

<div class="layout">
<!-- ══ SIDEBAR ══ -->
<aside class="sb">
  <div>
    <div class="sl">Modo</div>
    <div class="tabs">
      <button class="tab on" id="t-ind" onclick="setMode('ind')">◎ Individual</button>
      <button class="tab"    id="t-csv" onclick="setMode('csv')">⊞ CSV Masivo</button>
    </div>
  </div>

  <!-- INDIVIDUAL -->
  <div class="panel on" id="p-ind">
    <div class="infobox">Escribe el número de destinatario. Si cargaste un CSV en modo Masivo, los datos se auto-completan.</div>
    <div class="cg">
      <label>NÚMERO DESTINATARIO</label>
      <input id="ind-num" placeholder="9000001893" oninput="buscar()">
    </div>
    <div id="ind-msg" class="ok"></div>
    <div class="cg">
      <label>NOMBRE TIENDA <span style="color:var(--mt)">(auto)</span></label>
      <input id="ind-tda" placeholder="ABARROTES LOLITA">
    </div>
    <div class="cg">
      <label>NOMBRE RUTA <span style="color:var(--mt)">(auto)</span></label>
      <input id="ind-ruta" placeholder="RUTA TRADICIONAL ORIZABA">
    </div>
    <div class="cg">
      <label>COPIAS</label>
      <input type="number" id="ind-cop" value="1" min="1" max="99">
    </div>
    <button class="bp" onclick="addInd()">➕ GENERAR ETIQUETA</button>
  </div>

  <!-- CSV MASIVO -->
  <div class="panel" id="p-csv">
    <label class="drop" onclick="document.getElementById('csvf').click()">
      <input type="file" id="csvf" accept=".csv,.txt" onchange="loadCSV(this)">
      <div class="dt">📂 Cargar CSV de destinatarios<br><small>Separado por punto y coma ( ; )</small></div>
      <div class="df" id="fn-label"></div>
    </label>
    <div style="display:flex;align-items:center;justify-content:space-between">
      <span style="font-family:var(--mono);font-size:10px;color:var(--mt)">Registros WE:</span>
      <span class="cbadge" id="total-cnt">0</span>
    </div>
    <div class="cg">
      <label>FILTRAR POR FECHA DE CREACIÓN</label>
      <div class="frow">
        <input id="f-fecha" placeholder="ej: 20260301" oninput="doFilter()">
        <button onclick="cl('f-fecha')">✕</button>
      </div>
    </div>
    <div class="cg">
      <label>FILTRAR POR RUTA</label>
      <div class="frow">
        <input id="f-ruta" placeholder="ej: ORIZABA o 7214" oninput="doFilter()">
        <button onclick="cl('f-ruta')">✕</button>
      </div>
    </div>
    <div class="cg">
      <label>FILTRAR POR TIENDA</label>
      <div class="frow">
        <input id="f-tda" placeholder="ej: LOLITA" oninput="doFilter()">
        <button onclick="cl('f-tda')">✕</button>
      </div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between">
      <span style="font-family:var(--mono);font-size:10px;color:var(--mt)">Filtrados:</span>
      <span class="cbadge" id="filt-cnt">0</span>
    </div>
    <div class="rlist" id="rec-list"></div>
    <div class="srow">
      <button class="bs" onclick="selAll()">☑ Todos</button>
      <button class="bs" onclick="selNone()">☐ Ninguno</button>
    </div>
    <div class="cg">
      <label>COPIAS POR ETIQUETA</label>
      <input type="number" id="csv-cop" value="1" min="1" max="99">
    </div>
    <button class="bp" id="btn-add" disabled onclick="addSel()">➕ AGREGAR SELECCIONADOS</button>
  </div>

  <button class="bs" onclick="clearAll()" style="margin-top:4px">🗑 Limpiar etiquetas</button>
</aside>

<!-- ══ PREVIEW ══ -->
<main class="pv">
  <div class="ph">
    <h2>VISTA PREVIA DE ETIQUETAS</h2>
    <div class="pc">
      <button onclick="clearAll()">✕ Limpiar</button>
      <button class="bpr" onclick="doPrint()">🖨 IMPRIMIR</button>
    </div>
  </div>
  <div id="grid">
    <div class="es"><div class="ei">⬜</div>Las etiquetas aparecerán aquí.</div>
  </div>
</main>
</div>
<div id="parea" style="display:none"></div>

document.getElementById("himg").src = "data:image/png;base64," + LOGO;

let mode="ind", allRecs=[], filtRecs=[], queue=[];

function setMode(m){
  mode=m;
  ["ind","csv"].forEach(x=>{
    document.getElementById("t-"+x).classList.toggle("on",m===x);
    document.getElementById("p-"+x).classList.toggle("on",m===x);
  });
}

/* ── CSV ── */
function loadCSV(inp){
  const f=inp.files[0]; if(!f)return;
  document.getElementById("fn-label").textContent=f.name;
  const r=new FileReader();
  r.onload=e=>parseCSV(e.target.result);
  r.readAsText(f,"ISO-8859-1");
}
function ci(hdr,k){const i=hdr.findIndex(h=>h.trim().toUpperCase()===k);return i>=0?i:0}
function parseCSV(txt){
  const lines=txt.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2)return;
  const h=lines[0].split(";");
  const CI=ci(h,"CLIENTE"),NI=ci(h,"NOMBRE"),VKI=ci(h,"VKORG"),VTI=ci(h,"VTWEG"),
        SPI=ci(h,"SPART"),PAI=ci(h,"PARVW"),INI=ci(h,"INTERLOCUTOR"),
        NNI=ci(h,"NOMBRE_INTERLOCUTOR"),FCI=ci(h,"FECHA_CREACION"),UCI=ci(h,"USUARIO_CREACION");
  allRecs=[];
  for(let i=1;i<lines.length;i++){
    const c=lines[i].split(";");
    if(c.length<7)continue;
    if((c[PAI]||"").trim()!=="WE")continue;
    const cliN=(c[CI]||"").trim().replace(/^0+/,"");
    const intN=(c[INI]||"").trim().replace(/^0+/,"");
    if(!intN||intN===cliN)continue;
    allRecs.push({
      cli:(c[CI]||"").trim(), nom:(c[NI]||"").trim(),
      vko:(c[VKI]||"").trim(), vtw:(c[VTI]||"").trim(), spt:(c[SPI]||"").trim(),
      int:(c[INI]||"").trim(), tda:(c[NNI]||"").trim(),
      fch:(c[FCI]||"").trim(), usr:(c[UCI]||"").trim()
    });
  }
  document.getElementById("total-cnt").textContent=allRecs.length;
  doFilter();
}

/* ── FILTER ── */
function cl(id){document.getElementById(id).value="";doFilter();}
function doFilter(){
  const ff=v("f-fecha"), fr=v("f-ruta").toUpperCase(), ft=v("f-tda").toUpperCase();
  filtRecs=allRecs.filter(r=>{
    return (!ff||r.fch.includes(ff))
        && (!fr||r.cli.includes(fr)||r.nom.toUpperCase().includes(fr))
        && (!ft||r.tda.toUpperCase().includes(ft));
  });
  document.getElementById("filt-cnt").textContent=filtRecs.length;
  renderList();
  document.getElementById("btn-add").disabled=filtRecs.length===0;
}
function renderList(){
  const el=document.getElementById("rec-list");
  if(!filtRecs.length){el.innerHTML='<div style="padding:10px;text-align:center;font-size:11px;color:var(--mt);font-family:var(--mono)">Sin resultados</div>';return;}
  el.innerHTML=filtRecs.slice(0,500).map((r,i)=>`
    <div class="ri" onclick="tog(${i})">
      <input type="checkbox" class="rcb" data-i="${i}" onclick="event.stopPropagation();tog(${i})">
      <div class="rm">
        <div class="ri-id">${esc(r.int)}</div>
        <div class="ri-nm">${esc(r.tda||"(sin nombre)")}</div>
        <div class="ri-rt">${esc(r.nom)} · ${esc(r.fch)}</div>
      </div>
    </div>`).join("");
}
function tog(i){const cbs=document.querySelectorAll(".rcb");const cb=cbs[i];if(!cb)return;cb.checked=!cb.checked;cb.closest(".ri").classList.toggle("sel",cb.checked);}
function selAll(){document.querySelectorAll(".rcb").forEach(cb=>{cb.checked=true;cb.closest(".ri").classList.add("sel");});}
function selNone(){document.querySelectorAll(".rcb").forEach(cb=>{cb.checked=false;cb.closest(".ri").classList.remove("sel");});}

/* ── INDIVIDUAL auto-fill ── */
function buscar(){
  const raw=v("ind-num");
  const msg=document.getElementById("ind-msg");
  if(!raw){msg.textContent="";msg.className="ok";return;}
  if(!allRecs.length){msg.textContent="Carga un CSV para auto-completar";msg.className="warn";return;}
  const num=raw.replace(/^0+/,"");
  const rec=allRecs.find(r=>r.int.replace(/^0+/,"")===num);
  if(rec){
    document.getElementById("ind-tda").value=rec.tda;
    document.getElementById("ind-ruta").value=rec.nom;
    msg.textContent="✓ "+rec.tda+" | "+rec.nom;
    msg.className="ok";
  } else {
    document.getElementById("ind-tda").value="";
    document.getElementById("ind-ruta").value="";
    msg.textContent="⚠ No encontrado en el CSV";
    msg.className="warn";
  }
}

/* ── ADD INDIVIDUAL ── */
function addInd(){
  const num=v("ind-num");
  if(!num){alert("Escribe el número de destinatario.");return;}
  const tda=v("ind-tda"), ruta=v("ind-ruta");
  const cop=parseInt(v("ind-cop"))||1;
  const rec={int:num,tda:tda,nom:ruta,fch:"",cli:""};
  if(allRecs.length){
    const found=allRecs.find(r=>r.int.replace(/^0+/,"")===num.replace(/^0+/,""));
    if(found)Object.assign(rec,found);
  }
  for(let c=0;c<cop;c++)queue.push(mkLabel(rec));
  render();
}

/* ── ADD SELECTED ── */
function addSel(){
  const cbs=document.querySelectorAll(".rcb");
  const cop=parseInt(v("csv-cop"))||1;
  let n=0;
  cbs.forEach((cb,i)=>{if(!cb.checked||!filtRecs[i])return;for(let c=0;c<cop;c++){queue.push(mkLabel(filtRecs[i]));n++;}});
  if(n)render();
}

/* ── MAKE LABEL ── */
function pad(s,n){return String(s||"").padStart(n,"0");}
function mkLabel(r){
  return{
    qrStr:pad(r.int,10),
    int:pad(r.int,10),
    tda:r.tda||"",
    ruta:r.nom||"",
    id:Math.random().toString(36).slice(2)
  };
}

/* ── LABEL HTML ── */
function lblHTML(lb,qrId){
  return `<div class="ql-logo"><img src="data:image/png;base64,${LOGO}" alt="CF"></div>
<div class="ql-qr" id="${qrId}"></div>
<div class="ql-num">${esc(lb.int)}</div>
<div class="ql-ruta">${esc(lb.ruta)}</div>`;
}

/* ── RENDER ── */
function render(){
  const g=document.getElementById("grid");
  if(!queue.length){g.innerHTML='<div class="es"><div class="ei">⬜</div>Las etiquetas aparecerán aquí.</div>';return;}
  g.innerHTML="";
  queue.forEach((lb,idx)=>{
    const qrId="qr-"+lb.id;
    const w=document.createElement("div");
    w.className="lw";
    w.innerHTML=`<div class="la"><button onclick="rmLbl(${idx})">✕ quitar</button></div><div class="qlabel">${lblHTML(lb,qrId)}</div>`;
    g.appendChild(w);
    setTimeout(()=>{
      const el=document.getElementById(qrId);
      if(el)new QRCode(el,{text:lb.qrStr,width:162,height:162,colorDark:"#000",colorLight:"#fff",correctLevel:QRCode.CorrectLevel.M});
    },0);
  });
}
function rmLbl(i){queue.splice(i,1);render();}
function clearAll(){queue=[];render();}

/* ── PRINT ── */
async function doPrint(){
  if(!queue.length){alert("No hay etiquetas.");return;}
  const pa=document.getElementById("parea");
  pa.innerHTML="";pa.style.cssText="display:flex;flex-wrap:wrap;gap:1mm;";
  const ps=queue.map(lb=>new Promise(res=>{
    const qrId="pqr-"+lb.id;
    const d=document.createElement("div");
    d.className="qlabel";
    d.innerHTML=lblHTML(lb,qrId);
    pa.appendChild(d);
    setTimeout(()=>{
      const el=document.getElementById(qrId);
      if(el)new QRCode(el,{text:lb.qrStr,width:200,height:200,colorDark:"#000",colorLight:"#fff",correctLevel:QRCode.CorrectLevel.M});
      res();
    },20);
  }));
  await Promise.all(ps);
  setTimeout(()=>{window.print();pa.innerHTML="";pa.style.display="none";},600);
}

function v(id){return(document.getElementById(id).value||"").trim();}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
render();
</script>
